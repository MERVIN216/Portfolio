<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Stack Portfolio</title>
    <link rel="stylesheet" href="./skills.css">
</head>
<body>

    <nav class="outer">
        <h1>MY PORTFOLIO</h1>
        <ul>
            <li><a href="./index.html">Home</a></li>
            <li><a href="./skills.html">Skills</a></li>
            <li><a href="#">Projects</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <main>
        <h1>My Skills</h1>
        <div class="cards">
            <div class="card-wrapper html-card">
                <input type="checkbox" id="flip-html" hidden>
                <label for="flip-html" class="card">
                    <div class="cardinner">
                        <div class="cardfront">
                            <img src="./html.png">
                            <h2>HTML</h2>
                        </div>
                        <div class="cardback">
                            <div class="terminal">
                                <ul>
                                    <li>Semantic HTML5 Elements</li>
                                    <li>Accessibility (ARIA)</li>
                                    <li>SEO Best Practices</li>
                                    <li>Forms & Validation</li>
                                    <li>SVG & Canvas Integration</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </label>
            </div>
            <div class="card-wrapper css-card">
                <input type="checkbox" id="flip-css" hidden>
                <label for="flip-css" class="card">
                    <div class="cardinner">
                        <div class="cardfront">
                            <img src="./css.png" class="css">
                            <h2>CSS</h2>
                        </div>
                        <div class="cardback">
                            <div class="terminal">
                                <ul>
                                    <li>Flexbox & Grid Layouts</li>
                                    <li>Responsive Design</li>
                                    <li>CSS Animations & Transitions</li>
                                    <li>SASS / SCSS Preprocessing</li>
                                    <li>Tailwind & Bootstrap</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </label>
            </div>
            <div class="card-wrapper js-card">
                <input type="checkbox" id="flip-js" hidden>
                <label for="flip-js" class="card">
                    <div class="cardinner">
                        <div class="cardfront">
                            <img src="./JS.png" class="js">
                            <h2>JavaScript</h2>
                        </div>
                        <div class="cardback">
                            <div class="terminal">
                                <ul>
                                    <li>ES6+ Modern Syntax</li>
                                    <li>DOM Manipulation</li>
                                    <li>Async / Await & Promises</li>
                                    <li>Event Handling</li>
                                    <li>REST API Integration</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </label>
            </div>
            <div class="card-wrapper java-card">
                <input type="checkbox" id="flip-java" hidden>
                <label for="flip-java" class="card">
                    <div class="cardinner">
                        <div class="cardfront">
                            <img src="./java.png" class="java">
                            <h2>Java</h2>
                        </div>
                        <div class="cardback">
                            <div class="terminal">
                                <ul>
                                    <li>OOP Principles</li>
                                    <li>Spring Boot Framework</li>
                                    <li>Multithreading</li>
                                    <li>JDBC & Hibernate</li>
                                    <li>JUnit Testing</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </label>
            </div>
            <div class="card-wrapper sql-card">
                <input type="checkbox" id="flip-sql" hidden>
                <label for="flip-sql" class="card">
                    <div class="cardinner">
                        <div class="cardfront">
                            <img src="./SQL.png" class="sql">
                            <h2>SQL</h2>
                        </div>
                        <div class="cardback">
                            <div class="terminal">
                                <ul>
                                    <li>Complex JOIN Operations</li>
                                    <li>Stored Procedures</li>
                                    <li>Database Normalization</li>
                                    <li>Indexing & Optimization</li>
                                    <li>MySQL & PostgreSQL</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </label>
            </div>
            <div class="card-wrapper react-card">
                <input type="checkbox" id="flip-react" hidden>
                <label for="flip-react" class="card">
                    <div class="cardinner">
                        <div class="cardfront">
                            <img src="./React.png" class="react">
                            <h2>React</h2>
                        </div>
                        <div class="cardback">
                            <div class="terminal">
                                <ul>
                                    <li>Hooks & Functional Components</li>
                                    <li>Redux State Management</li>
                                    <li>React Router</li>
                                    <li>Component Lifecycle</li>
                                    <li>Next.js Integration</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </label>
            </div>

        </div>
    </main>

</body>
</html>
